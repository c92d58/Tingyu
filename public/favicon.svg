<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5248"/>
      <stop offset="100%" stop-color="#3a3630"/>
    </linearGradient>
  </defs>
  <!-- Seal base -->
  <rect x="1" y="1" width="30" height="30" rx="8" fill="currentColor" opacity="0.04"/>
  <rect x="1" y="1" width="30" height="30" rx="8" stroke="currentColor" stroke-width="1.2" opacity="0.2"/>
  <!-- Simplified 雨 character inspired droplet -->
  <!-- Top horizontal stroke -->
  <line x1="8" y1="9" x2="24" y2="9" stroke="url(#fg)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center vertical → stylized raindrop body -->
  <path d="M16 12 L12 24 Q16 27 20 24 L16 12Z" fill="url(#fg)" opacity="0.85"/>
  <!-- Left dot (rain drop) -->
  <circle cx="10.5" cy="20" r="1.2" fill="url(#fg)" opacity="0.7"/>
  <!-- Right dot (rain drop) -->
  <circle cx="21.5" cy="20" r="1.2" fill="url(#fg)" opacity="0.7"/>
  <!-- Bottom dots -->
  <circle cx="13" cy="25" r="1" fill="url(#fg)" opacity="0.5"/>
  <circle cx="19" cy="25" r="1" fill="url(#fg)" opacity="0.5"/>
</svg>
