<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5248"/>
      <stop offset="100%" stop-color="#3a3630"/>
    </linearGradient>
    <linearGradient id="sealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.01"/>
    </linearGradient>
  </defs>
  <!-- Seal frame -->
  <rect x="2" y="2" width="116" height="116" rx="24" fill="url(#sealGrad)"/>
  <rect x="2" y="2" width="116" height="116" rx="24" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
  <!-- 雨 character - top horizontal -->
  <line x1="22" y1="28" x2="98" y2="28" stroke="url(#inkGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Rain body / central stroke -->
  <path d="M60 36 L45 72 Q60 84 75 72 L60 36Z" fill="url(#inkGrad)" opacity="0.88"/>
  <!-- Rain dots around -->
  <circle cx="32" cy="65" r="4.5" fill="url(#inkGrad)" opacity="0.65"/>
  <circle cx="88" cy="65" r="4.5" fill="url(#inkGrad)" opacity="0.65"/>
  <circle cx="42" cy="82" r="3.5" fill="url(#inkGrad)" opacity="0.45"/>
  <circle cx="78" cy="82" r="3.5" fill="url(#inkGrad)" opacity="0.45"/>
  <!-- Subtle decorative drops falling -->
  <circle cx="28" cy="92" r="2.5" fill="url(#inkGrad)" opacity="0.25"/>
  <circle cx="92" cy="92" r="2.5" fill="url(#inkGrad)" opacity="0.25"/>
  <circle cx="60" cy="100" r="2" fill="url(#inkGrad)" opacity="0.2"/>
</svg>
